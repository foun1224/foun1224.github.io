<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>foun1224 — Projects</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #17191E;
      color: #C9CDD8;
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 60px 20px;
    }

    header {
      text-align: center;
      margin-bottom: 56px;
    }

    header h1 {
      font-size: 2rem;
      font-weight: 700;
      color: #E8EAF0;
      letter-spacing: -0.5px;
    }

    header p {
      margin-top: 8px;
      font-size: 0.95rem;
      color: #6B7280;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
      gap: 20px;
      width: 100%;
      max-width: 900px;
    }

    .card {
      background: #22242C;
      border: 1px solid #2E3240;
      border-radius: 12px;
      padding: 28px 24px;
      text-decoration: none;
      color: inherit;
      transition: border-color 0.2s, transform 0.2s;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .card:hover {
      border-color: #5C6BC0;
      transform: translateY(-2px);
    }

    .card-icon {
      font-size: 1.8rem;
    }

    .card-title {
      font-size: 1.1rem;
      font-weight: 600;
      color: #E8EAF0;
    }

    .card-desc {
      font-size: 0.875rem;
      color: #6B7280;
      line-height: 1.5;
    }

    .card-url {
      font-size: 0.75rem;
      color: #4A5568;
      margin-top: auto;
      padding-top: 12px;
      border-top: 1px solid #2E3240;
      word-break: break-all;
    }

    footer {
      margin-top: 64px;
      font-size: 0.8rem;
      color: #3A3F4F;
    }
  </style>
</head>
<body>
  <header>
    <h1>foun1224</h1>
    <p>GitHub Pages Projects</p>
  </header>

  <div class="grid">
    <a class="card" href="https://foun1224.github.io/bible-reader/" target="_blank" rel="noopener">
      <div class="card-icon">📖</div>
      <div class="card-title">Bible Reader</div>
      <div class="card-desc">CKJV 聖經閱讀器，支援章節導覽與深色模式。</div>
      <div class="card-url">foun1224.github.io/bible-reader/</div>
    </a>

    <a class="card" href="https://foun1224.github.io/ai-pet-web/" target="_blank" rel="noopener">
      <div class="card-icon">🐾</div>
      <div class="card-title">AI Pet Web</div>
      <div class="card-desc">AI 寵物互動網頁應用。</div>
      <div class="card-url">foun1224.github.io/ai-pet-web/</div>
    </a>

    <a class="card" href="https://foun1224.github.io/Invest_Analyze/" target="_blank" rel="noopener">
      <div class="card-icon">📊</div>
      <div class="card-title">Invest Analyze</div>
      <div class="card-desc">投資分析工具，視覺化財務數據。</div>
      <div class="card-url">foun1224.github.io/Invest_Analyze/</div>
    </a>
  </div>

  <footer>github.com/foun1224</footer>
</body>
</html>
